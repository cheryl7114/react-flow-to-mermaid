document:
  dsl: '1.0.0'
  namespace: default
  name: order-processing
  version: '1.0.0'
do:
  - validateOrder:
      call: http
      with:
        method: post
        endpoint: https://api.example.com/validate
  - checkInventory:
      call: http
      with:
        method: get
        endpoint: https://api.example.com/inventory
  - processPayment:
      call: http
      with:
        method: post
        endpoint: https://api.example.com/payment
  - shipOrder:
      call: http
      with:
        method: post
        endpoint: https://api.example.com/ship
