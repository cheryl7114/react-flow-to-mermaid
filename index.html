<!DOCTYPE html>
<html lang="en">

<head>
    <!-- React Flow CSS and JS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reactflow@11/dist/style.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/reactflow@11.11.4/dist/umd/index.js"></script>


    <!-- Mermaid JS -->
    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
        mermaid.initialize({ startOnLoad: false });
        window.mermaid = mermaid;
    </script>

    <!-- Carbon Web Components -->
    <script type="module"
        src="https://1.www.s81c.com/common/carbon/web-components/tag/v2/latest/button.min.js"></script>
    <script type="module"
        src="https://1.www.s81c.com/common/carbon/web-components/tag/v2/latest/textarea.min.js"></script>


    <!-- Carbon Styles (needed for base styling) -->
    <link rel="stylesheet" href="https://unpkg.com/@carbon/styles@1.59.0/css/styles.css">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React Flow to Mermaid</title>

    <script src="script.js"></script>
    <script>
        async function handleConvert() {
            // Convert to mermaid syntax
            const mermaidSyntax = convertToMermaid(sampleData)

            // Display the mermaid syntax in the textarea
            document.getElementById('mermaidCode').value = mermaidSyntax;

            // Render the mermaid diagram
            const outputDiv = document.getElementById('mermaidOutput')
            outputDiv.innerHTML = '' // Clear previous output

            const { svg } = await mermaid.render('mermaid-diagram', mermaidSyntax)
            outputDiv.innerHTML = svg

            document.getElementById('exportSvgBtn').disabled = false
            document.getElementById('exportPngBtn').disabled = false

        }

        function exportAsSvg() {
            const svg = document.querySelector('#mermaidOutput svg')
            if (!svg) return

            const svgData = new XMLSerializer().serializeToString(svg)
            const blob = new Blob([svgData], { type: 'image/svg+xml' })
            downloadFile(blob, 'mermaid-diagram.svg')
        }

        function exportAsPng() {
            const svg = document.querySelector('#mermaidOutput svg')
            if (!svg) return

            const canvas = document.createElement('canvas')
            const ctx = canvas.getContext('2d')
            
            // Get SVG dimensions from viewBox or bounding box
            const bbox = svg.getBBox()
            const viewBox = svg.viewBox.baseVal
            const width = viewBox.width || bbox.width || 800
            const height = viewBox.height || bbox.height || 600
            
            // Clone and set explicit dimensions on SVG
            const svgClone = svg.cloneNode(true)
            svgClone.setAttribute('width', width)
            svgClone.setAttribute('height', height)
            
            const svgData = new XMLSerializer().serializeToString(svgClone)
            const img = new Image()
            
            img.onload = function() {
                const scale = 3
                canvas.width = width * scale
                canvas.height = height * scale
                
                ctx.scale(scale, scale)
                ctx.drawImage(img, 0, 0, width, height)
                
                canvas.toBlob(function(blob) {
                    downloadFile(blob, 'mermaid-diagram.png')
                })
            }
            
            const svgBase64 = btoa(unescape(encodeURIComponent(svgData)))
            img.src = 'data:image/svg+xml;base64,' + svgBase64
        }

        function downloadFile(blob, filename) {
            const link = document.createElement('a')
            link.href = URL.createObjectURL(blob)
            link.download = filename
            link.click()
            URL.revokeObjectURL(link.href)
        }
    </script>
    <style>
        body {
            padding: 3%;
        }

        #mermaidOutput {
            margin-top: 2%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

<body>
    <div>
        <div style="margin-bottom: 2%">
            <h2 style="margin-bottom: 1%">React Flow Graph</h2>
            <div id="reactflow" style="width: 100%; height: 400px; border: 1px solid #ddd;"></div>
        </div>

        <!-- Convert button -->
        <cds-button id="convertBtn" onClick="handleConvert()" onKeyPress="handleConvert()">Convert to
            Mermaid</cds-button>

        <div>
            <h2 style="margin-bottom: 1%; margin-top: 3%">Mermaid Diagram</h2>
            <cds-textarea id="mermaidCode" rows="8" readonly helper-text="TextArea helper text"
                label="Mermaid code"></cds-textarea>
            <div id="mermaidOutput"></div>
        </div>

        <cds-button id="exportSvgBtn" onClick="exportAsSvg()" disabled>Export As SVG</cds-button>
        <cds-button id="exportPngBtn" onClick="exportAsPng()" disabled>Export As PNG</cds-button>
    </div>

    <script>
        // Sample React Flow data demonstrating nested subflows
        const sampleData = {
            nodes: [
                // Root level nodes
                { id: 'start', data: { label: 'Start' }, position: { x: 250, y: 0 } },

                // First subflow - Data Processing
                {
                    id: 'processing',
                    data: { label: 'Data Processing' },
                    position: { x: 150, y: 100 },
                    style: { width: 500, height: 350, backgroundColor: 'rgba(240, 240, 255, 0.5)' }
                },

                // Child nodes inside processing subflow
                {
                    id: 'validate',
                    data: { label: 'Validate Input' },
                    parentNode: 'processing',
                    extent: 'parent',
                    position: { x: 30, y: 40 }
                },

                // Nested subflow inside processing - Transformation Pipeline
                {
                    id: 'transformPipeline',
                    data: { label: 'Transformation Pipeline' },
                    parentNode: 'processing',
                    extent: 'parent',
                    position: { x: 30, y: 120 },
                    style: { width: 300, height: 150, backgroundColor: 'rgba(200, 200, 255, 0.5)' }
                },

                // Grandchild nodes inside transformPipeline (nested 2 levels deep)
                {
                    id: 'parse',
                    data: { label: 'Parse' },
                    parentNode: 'transformPipeline',
                    extent: 'parent',
                    position: { x: 20, y: 40 }
                },
                {
                    id: 'normalize',
                    data: { label: 'Normalize' },
                    parentNode: 'transformPipeline',
                    extent: 'parent',
                    position: { x: 150, y: 40 }
                },

                {
                    id: 'enrich',
                    data: { label: 'Enrich' },
                    parentNode: 'processing',
                    extent: 'parent',
                    position: { x: 350, y: 180 }
                },

                // Second subflow - Error Handling
                {
                    id: 'errorHandling',
                    data: { label: 'Error Handling' },
                    position: { x: 700, y: 150 },
                    style: { width: 350, height: 250, backgroundColor: 'rgba(255, 240, 240, 0.5)' }
                },

                // Nested subflow inside errorHandling - Logging System
                {
                    id: 'loggingSystem',
                    data: { label: 'Logging System' },
                    parentNode: 'errorHandling',
                    extent: 'parent',
                    position: { x: 30, y: 40 },
                    style: { width: 250, height: 120, backgroundColor: 'rgba(255, 200, 200, 0.5)' }
                },

                // Grandchild nodes inside loggingSystem
                {
                    id: 'logError',
                    data: { label: 'Log Error' },
                    parentNode: 'loggingSystem',
                    extent: 'parent',
                    position: { x: 20, y: 40 }
                },
                {
                    id: 'logMetrics',
                    data: { label: 'Log Metrics' },
                    parentNode: 'loggingSystem',
                    extent: 'parent',
                    position: { x: 130, y: 40 }
                },

                {
                    id: 'notify',
                    data: { label: 'Notify Admin' },
                    parentNode: 'errorHandling',
                    extent: 'parent',
                    position: { x: 30, y: 180 }
                },

                // More root level nodes
                { id: 'decision', data: { label: 'Success?' }, position: { x: 400, y: 500 } },
                { id: 'save', data: { label: 'Save to DB' }, position: { x: 300, y: 600 } },
                { id: 'finish', data: { label: 'Finish' }, position: { x: 400, y: 700 } }
            ],
            edges: [
                // Main flow
                { id: 'e1', source: 'start', target: 'validate', label: 'Begin' },
                
                // Inside processing subflow
                { id: 'e2', source: 'validate', target: 'parse' },
                
                // Inside nested transformPipeline
                { id: 'e3', source: 'parse', target: 'normalize' },
                
                // Exit nested subflow to parent subflow
                { id: 'e4', source: 'normalize', target: 'enrich' },
                
                // Exit processing subflow
                { id: 'e5', source: 'enrich', target: 'decision' },
                
                // Decision branches
                { id: 'e6', source: 'decision', target: 'save', label: 'Yes', type: 'conditional' },
                { id: 'e7', source: 'decision', target: 'logError', label: 'No', type: 'conditional' },
                
                // Inside nested loggingSystem
                { id: 'e8', source: 'logError', target: 'logMetrics' },
                
                // Exit nested subflow to parent subflow
                { id: 'e9', source: 'logMetrics', target: 'notify' },
                
                // Error flow back to main
                { id: 'e10', source: 'notify', target: 'finish', type: 'error' },
                
                // Success flow
                { id: 'e11', source: 'save', target: 'finish' },
                
                // Error edge from nested subflow to another nested subflow
                { id: 'e12', source: 'normalize', target: 'logError', label: 'Exception', type: 'error' }
            ]
        }

        // Initialize React Flow
        const { ReactFlow } = window.ReactFlow
        const root = ReactDOM.createRoot(document.getElementById('reactflow'))

        root.render(
            React.createElement(ReactFlow, {
                nodes: sampleData.nodes,
                edges: sampleData.edges,
                fitView: true
            })
        )
    </script>

</body>

</html>
