<!DOCTYPE html>
<html lang="en">

<head>
    <!-- React Flow CSS and JS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reactflow@11/dist/style.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/reactflow@11.11.4/dist/umd/index.js"></script>


    <!-- Mermaid JS -->
    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
        mermaid.initialize({ startOnLoad: false });
        window.mermaid = mermaid;
    </script>

    <!-- Carbon Web Components -->
    <script type="module"
        src="https://1.www.s81c.com/common/carbon/web-components/tag/v2/latest/button.min.js"></script>
    <script type="module"
        src="https://1.www.s81c.com/common/carbon/web-components/tag/v2/latest/textarea.min.js"></script>


    <!-- Carbon Styles (needed for base styling) -->
    <link rel="stylesheet" href="https://unpkg.com/@carbon/styles@1.59.0/css/styles.css">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React Flow to Mermaid</title>

    <script src="script.js"></script>
    <style>
        body {
            padding: 3%;
        }

        #mermaidOutput {
            margin-top: 2%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

<body>
    <div>
        <div style="margin-bottom: 2%">
            <h2 style="margin-bottom: 1%">React Flow Graph</h2>
            <div id="reactflow" style="width: 100%; height: 400px; border: 1px solid #ddd;"></div>
        </div>

        <!-- Convert button -->
        <cds-button id="convertBtn" onClick="handleConvert()" onKeyPress="handleConvert()">Convert to
            Mermaid</cds-button>

        <div>
            <h2 style="margin-bottom: 1%; margin-top: 3%">Mermaid Diagram</h2>
            <cds-textarea id="mermaidCode" rows="8" readonly helper-text="TextArea helper text"
                label="Mermaid code"></cds-textarea>
            <div id="mermaidOutput"></div>
        </div>

        <cds-button id="exportSvgBtn" onClick="exportAsSvg()" disabled>Export As SVG</cds-button>
        <cds-button id="exportPngBtn" onClick="exportAsPng()" disabled>Export As PNG</cds-button>
    </div>

    <script>
        // Sample React Flow data demonstrating all three edge types
        const sampleData = {
            nodes: [
                // Root level nodes
                { id: 'start', data: { label: 'Start' }, position: { x: 250, y: 0 } },

                // First subflow - Data Processing
                {
                    id: 'processing',
                    data: { label: 'Data Processing' },
                    position: { x: 150, y: 100 },
                    style: { width: 400, height: 250, backgroundColor: 'rgba(240, 240, 255, 0.5)' }
                },

                // Child nodes inside processing subflow
                {
                    id: 'validate',
                    data: { label: 'Validate Input' },
                    parentNode: 'processing',
                    extent: 'parent',
                    position: { x: 30, y: 40 }
                },
                {
                    id: 'transform',
                    data: { label: 'Transform Data' },
                    parentNode: 'processing',
                    extent: 'parent',
                    position: { x: 30, y: 120 }
                },
                {
                    id: 'enrich',
                    data: { label: 'Enrich' },
                    parentNode: 'processing',
                    extent: 'parent',
                    position: { x: 220, y: 80 }
                },

                // Second subflow - Error Handling
                {
                    id: 'errorHandling',
                    data: { label: 'Error Handling' },
                    position: { x: 600, y: 150 },
                    style: { width: 300, height: 180, backgroundColor: 'rgba(255, 240, 240, 0.5)' }
                },

                // Child nodes inside error handling subflow
                {
                    id: 'logError',
                    data: { label: 'Log Error' },
                    parentNode: 'errorHandling',
                    extent: 'parent',
                    position: { x: 30, y: 40 }
                },
                {
                    id: 'notify',
                    data: { label: 'Notify Admin' },
                    parentNode: 'errorHandling',
                    extent: 'parent',
                    position: { x: 30, y: 110 }
                },

                // More root level nodes
                { id: 'decision', data: { label: 'Success?' }, position: { x: 350, y: 400 } },
                { id: 'save', data: { label: 'Save to DB' }, position: { x: 250, y: 500 } },
                { id: 'finish', data: { label: 'Finish' }, position: { x: 350, y: 600 } }
            ],
            edges: [
                // Main flow
                { id: 'e1', source: 'start', target: 'validate', label: 'Begin' },

                // Inside processing subflow
                { id: 'e2', source: 'validate', target: 'transform' },
                { id: 'e3', source: 'transform', target: 'enrich' },

                // Exit processing subflow
                { id: 'e4', source: 'enrich', target: 'decision' },

                // Decision branches
                { id: 'e5', source: 'decision', target: 'save', label: 'Yes', type: 'conditional' },
                { id: 'e6', source: 'decision', target: 'logError', label: 'No', type: 'conditional' },

                // Inside error handling subflow
                { id: 'e7', source: 'logError', target: 'notify' },

                // Error flow back to main
                { id: 'e8', source: 'notify', target: 'finish', type: 'error' },

                // Success flow
                { id: 'e9', source: 'save', target: 'finish' },

                // Error edge from processing to error handling
                { id: 'e10', source: 'transform', target: 'logError', label: 'Exception', type: 'error' }
            ]
        }

        // Initialize React Flow
        const { ReactFlow } = window.ReactFlow
        const root = ReactDOM.createRoot(document.getElementById('reactflow'))

        root.render(
            React.createElement(ReactFlow, {
                nodes: sampleData.nodes,
                edges: sampleData.edges,
                fitView: true
            })
        )
    </script>
    <script src="script.js"></script>

</body>

</html>
